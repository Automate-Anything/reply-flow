<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="0" y2="630" stroke="white" stroke-width="1"/>
    <line x1="60" y1="0" x2="60" y2="630" stroke="white" stroke-width="1"/>
    <line x1="120" y1="0" x2="120" y2="630" stroke="white" stroke-width="1"/>
    <line x1="180" y1="0" x2="180" y2="630" stroke="white" stroke-width="1"/>
    <line x1="240" y1="0" x2="240" y2="630" stroke="white" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="630" stroke="white" stroke-width="1"/>
    <line x1="360" y1="0" x2="360" y2="630" stroke="white" stroke-width="1"/>
    <line x1="420" y1="0" x2="420" y2="630" stroke="white" stroke-width="1"/>
    <line x1="480" y1="0" x2="480" y2="630" stroke="white" stroke-width="1"/>
    <line x1="540" y1="0" x2="540" y2="630" stroke="white" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="white" stroke-width="1"/>
    <line x1="660" y1="0" x2="660" y2="630" stroke="white" stroke-width="1"/>
    <line x1="720" y1="0" x2="720" y2="630" stroke="white" stroke-width="1"/>
    <line x1="780" y1="0" x2="780" y2="630" stroke="white" stroke-width="1"/>
    <line x1="840" y1="0" x2="840" y2="630" stroke="white" stroke-width="1"/>
    <line x1="900" y1="0" x2="900" y2="630" stroke="white" stroke-width="1"/>
    <line x1="960" y1="0" x2="960" y2="630" stroke="white" stroke-width="1"/>
    <line x1="1020" y1="0" x2="1020" y2="630" stroke="white" stroke-width="1"/>
    <line x1="1080" y1="0" x2="1080" y2="630" stroke="white" stroke-width="1"/>
    <line x1="1140" y1="0" x2="1140" y2="630" stroke="white" stroke-width="1"/>
    <line x1="1200" y1="0" x2="1200" y2="630" stroke="white" stroke-width="1"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="white" stroke-width="1"/>
    <line x1="0" y1="60" x2="1200" y2="60" stroke="white" stroke-width="1"/>
    <line x1="0" y1="120" x2="1200" y2="120" stroke="white" stroke-width="1"/>
    <line x1="0" y1="180" x2="1200" y2="180" stroke="white" stroke-width="1"/>
    <line x1="0" y1="240" x2="1200" y2="240" stroke="white" stroke-width="1"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="white" stroke-width="1"/>
    <line x1="0" y1="360" x2="1200" y2="360" stroke="white" stroke-width="1"/>
    <line x1="0" y1="420" x2="1200" y2="420" stroke="white" stroke-width="1"/>
    <line x1="0" y1="480" x2="1200" y2="480" stroke="white" stroke-width="1"/>
    <line x1="0" y1="540" x2="1200" y2="540" stroke="white" stroke-width="1"/>
    <line x1="0" y1="600" x2="1200" y2="600" stroke="white" stroke-width="1"/>
  </g>

  <!-- Glow effect behind logo area -->
  <circle cx="600" cy="240" r="300" fill="url(#glow)"/>

  <!-- WhatsApp-style chat bubble icon -->
  <g transform="translate(540, 130)">
    <path d="M60 0C27 0 0 24 0 54c0 10 3 20 8 28l-8 28 30-8c8 4 18 6 28 6 33 0 60-24 60-54S93 0 60 0z" fill="#22c55e" opacity="0.9"/>
    <!-- AI sparkle inside bubble -->
    <g transform="translate(44, 30)" fill="white">
      <polygon points="16,0 20,12 32,16 20,20 16,32 12,20 0,16 12,12" opacity="0.95"/>
    </g>
  </g>

  <!-- Brand name -->
  <text x="600" y="310" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="72" font-weight="700" fill="white" letter-spacing="-1">
    ReplyFlow
  </text>

  <!-- Green accent line -->
  <rect x="520" y="330" width="160" height="3" rx="1.5" fill="url(#accent)"/>

  <!-- Tagline -->
  <text x="600" y="380" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="26" fill="#94a3b8" font-weight="400">
    AI-Powered WhatsApp Business Platform
  </text>

  <!-- Feature pills -->
  <g transform="translate(600, 430)" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="500">
    <!-- Pill 1 -->
    <rect x="-385" y="-18" width="170" height="36" rx="18" fill="#22c55e" opacity="0.12" stroke="#22c55e" stroke-width="1" stroke-opacity="0.3"/>
    <text x="-300" y="6" fill="#22c55e">AI Agents</text>

    <!-- Pill 2 -->
    <rect x="-195" y="-18" width="170" height="36" rx="18" fill="#22c55e" opacity="0.12" stroke="#22c55e" stroke-width="1" stroke-opacity="0.3"/>
    <text x="-110" y="6" fill="#22c55e">Knowledge Bases</text>

    <!-- Pill 3 -->
    <rect x="-5" y="-18" width="170" height="36" rx="18" fill="#22c55e" opacity="0.12" stroke="#22c55e" stroke-width="1" stroke-opacity="0.3"/>
    <text x="80" y="6" fill="#22c55e">Smart Inbox</text>

    <!-- Pill 4 -->
    <rect x="185" y="-18" width="200" height="36" rx="18" fill="#22c55e" opacity="0.12" stroke="#22c55e" stroke-width="1" stroke-opacity="0.3"/>
    <text x="285" y="6" fill="#22c55e">Contact Memory</text>
  </g>

  <!-- Bottom URL -->
  <text x="600" y="560" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="18" fill="#475569" font-weight="400">
    reply-flow.pages.dev
  </text>

  <!-- Subtle border -->
  <rect x="0" y="0" width="1200" height="630" fill="none" stroke="#1e293b" stroke-width="2"/>
</svg>